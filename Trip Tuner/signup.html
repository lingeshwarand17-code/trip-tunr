<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Trip Tuner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-color), #fce7f3);
        }

        .auth-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .auth-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease-out;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header .logo {
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .auth-title {
            font-size: 1.75rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.875rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            background: var(--white);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
            margin-top: 1rem;
        }

        .auth-footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            background: var(--white);
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-social:hover {
            background: #f1f5f9;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #cbd5e1;
        }

        .divider:not(:empty)::before {
            margin-right: 1rem;
        }

        .divider:not(:empty)::after {
            margin-left: 1rem;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-bg">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80"
                alt="Beautiful Beach">
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <i class="fa-solid fa-earth-americas"></i>
                    TripTuner
                </a>
                <h1 class="auth-title">Create an Account</h1>
                <p class="auth-subtitle">Join us and start planning your dream trips.</p>
            </div>

            <form action="index.html">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="Create a password (min 8 characters)"
                        required>
                </div>

                <button type="submit" class="btn btn-primary submit-btn">Sign Up</button>
            </form>

            <div class="divider">OR CONTINUE WITH</div>

            <div class="social-login">
                <button class="btn-social">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google"
                        width="20">
                    Google
                </button>
                <button class="btn-social">
                    <i class="fa-brands fa-apple" style="font-size: 1.25rem;"></i>
                    Apple
                </button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

</body>

</html>
